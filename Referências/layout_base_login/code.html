<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-on-surface">
<!-- Subtle Background Image -->
<div class="absolute inset-0 w-full h-full z-0 opacity-[0.15] bg-cover bg-center" data-alt="A soft, overhead view of a premium crafting desk bathed in warm, diffused morning sunlight. The scene features elegant scrapbook materials scattered aesthetically: vintage paper ephemera, delicate lace ribbons, and subtle gold foil stickers on a creamy, textured background. The overall tone is modern, minimalist, and serene, utilizing a light cream and pastel palette to convey a sense of calm creativity and high-end curation." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBEf37Vs_JoIW2s3dJnLp4NudigrlwB4uzR43T_l_7EciKQ-wNP5FJsW5X-AgpjDNHWt6iFM7ZpBpUKCUAzz1XPRVtaoLgIv0jp8cOxuiTJ9jKULhoxG6MuxLWdvJmEwiRHz4rvl8VRnl4TEtWihNLVNiXtxI6TGaXMDohkRbsLxkoHZBcri8J6j_r0mKePPowv1tMplhWde5WG3EWljr3JWR-uNWzeRJaecfhxX8RLgjf3ZKfV6faTGcWLjBvgNwLJXTy-3_-u2kc')"></div>
<div class="absolute inset-0 w-full h-full z-0 bg-background/60 backdrop-blur-[2px]"></div>
<!-- Login Container -->
<div class="relative z-10 w-full max-w-[440px] px-margin-mobile md:px-0">
<!-- Glassmorphism Card -->
<div class="bg-surface-container-lowest/90 backdrop-blur-md rounded-xl p-stack-lg shadow-[0px_4px_30px_rgba(0,0,0,0.06)] border border-surface-variant/50 relative overflow-hidden paper-texture">
<!-- Delicate Gold Accent Line -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-tertiary-fixed-dim opacity-70"></div>
<!-- Header -->
<div class="text-center mb-stack-lg">
<h1 class="text-headline-md font-headline-md text-primary mb-2 tracking-tight">Artisanal Archive</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Sign in to your curated collection</p>
</div>
<!-- Form -->
<form action="#" class="space-y-stack-md" method="POST">
<!-- Email Field -->
<div>
<label class="block text-label-md font-label-md text-on-surface mb-unit uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant/50">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface focus:outline-none transition-all duration-300 input-glow placeholder:text-on-surface-variant/40" id="email" name="email" placeholder="hello@studio.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-unit">
<label class="block text-label-md font-label-md text-on-surface uppercase tracking-wider" for="password">Password</label>
<a class="text-caption font-caption text-primary hover:text-primary-fixed-dim transition-colors duration-200" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant/50">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</span>
<input class="w-full pl-10 pr-10 py-3 bg-surface border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface focus:outline-none transition-all duration-300 input-glow placeholder:text-on-surface-variant/40" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-on-surface-variant/50 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-3 px-4 bg-primary-container text-on-primary-container text-label-md font-label-md rounded-lg uppercase tracking-wider hover:bg-primary-fixed hover:shadow-md transition-all duration-300 flex justify-center items-center gap-2 mt-stack-md border border-primary-fixed/50" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer / Secondary Actions -->
<div class="mt-stack-lg text-center">
<p class="text-caption font-caption text-on-surface-variant">
                    Don't have a studio account? 
                    <a class="text-primary hover:text-primary-fixed-dim transition-colors duration-200 border-b border-primary/30 pb-0.5 ml-1" href="#">Request Access</a>
</p>
</div>
</div>
</div>
